name: Build Amharic Keyboard

# Run on every push to main or any branch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (macOS + Xcode)
    runs-on: macos-15   # Xcode 16 — has iPhone 16 simulator

    steps:

      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Show what Xcode and simulators are available
      - name: Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep iPhone | tail -5

      # 3. Cache Homebrew to speed up future runs
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-xcodegen

      # 4. Install xcodegen (generates .xcodeproj from project.yml)
      - name: Install xcodegen
        run: brew install xcodegen || brew upgrade xcodegen

      # 5. Generate the Xcode project from project.yml
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # 6. Resolve Swift Package dependencies
      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project AmharicKeyboard.xcodeproj \
            -scheme AmharicKeyboard \
            -resolvePackageDependencies

      # 7. Build — CODE_SIGNING_ALLOWED=NO means no Apple account needed
      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project AmharicKeyboard.xcodeproj \
            -scheme AmharicKeyboard \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            2>&1 | tee build_output.txt | \
            grep -E "(error:|warning: |Build succeeded|FAILED|KeyboardExtension|AmharicKeyboard)" | \
            grep -v "note:" || true

          # Make the step fail if xcodebuild itself failed
          grep -q "BUILD SUCCEEDED" build_output.txt

      # 8. Upload full build log on failure for debugging
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
