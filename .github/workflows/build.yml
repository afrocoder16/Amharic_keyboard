name: Build Amharic Keyboard

# Run on every push to main or any branch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (macOS + Xcode)
    runs-on: macos-latest

    steps:

      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Show Xcode version available on the runner
      - name: Xcode version
        run: xcodebuild -version

      # 3. Cache Homebrew packages to speed up future runs
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      # 4. Install xcodegen (generates .xcodeproj from project.yml)
      - name: Install xcodegen
        run: |
          brew install xcodegen || brew upgrade xcodegen

      # 5. Generate the Xcode project from project.yml
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # 6. Resolve Swift Package dependencies
      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project AmharicKeyboard.xcodeproj \
            -scheme AmharicKeyboard \
            -resolvePackageDependencies \
            | grep -E "(error:|warning:|Resolved)" || true

      # 7. Build the container app + keyboard extension
      #    CODE_SIGNING_ALLOWED=NO means no Apple Developer account needed
      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project AmharicKeyboard.xcodeproj \
            -scheme AmharicKeyboard \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            2>&1 | tee build_output.txt | grep -E "(error:|warning:|Build succeeded|** BUILD)"

      # 8. Upload the build log if something goes wrong
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
